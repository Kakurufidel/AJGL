{% extends 'core/base.html' %}
{% block title %}Connexion{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-8">
    <h1 class="text-2xl font-bold text-green-800 mb-6 text-center">Connexion</h1>
    
    {% if form.errors %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
            Nom d'utilisateur ou mot de passe incorrect.
        </div>
    {% endif %}
    
    <form method="post">
        {% csrf_token %}
        
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">Nom d'utilisateur</label>
            <input type="text" name="username" class="w-full border rounded px-3 py-2" required>
        </div>
        
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">Mot de passe</label>
            <input type="password" name="password" class="w-full border rounded px-3 py-2" required>
        </div>
        
        <button type="submit" class="bg-orange-500 hover:bg-orange-600 text-white font-bold px-6 py-2 rounded w-full">
            Se connecter
        </button>
    </form>
    
    <p class="text-center text-gray-500 text-sm mt-4">
        Vous n'avez pas accès ? <a href="{% url 'adhesion' %}" class="text-green-600">Devenez membre</a>
    </p>
</div>
{% endblock %}
